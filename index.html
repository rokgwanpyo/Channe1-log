<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채널 시트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }
  .container { max-width: 960px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 2px; }
  .credit { font-size: 12px; color: #bbb; margin-bottom: 2rem; }
  .card { background: #fff; border: 0.5px solid #e0e0da; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .sec-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 12px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  input, select, textarea {
    width: 100%; font-size: 14px; padding: 8px 10px;
    border: 0.5px solid #ddd; border-radius: 8px;
    background: #fafaf8; color: #1a1a18; outline: none;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: #4a90d9; }
  textarea { resize: vertical; min-height: 56px; }

  /* 탭 */
  .tabs { display: flex; gap: 4px; margin-bottom: 14px; }
  .tab { padding: 7px 18px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 0.5px solid #ddd; background: transparent; color: #888; font-family: inherit; }
  .tab.active { background: #1a1a18; color: #fff; border-color: transparent; }

  /* 채널 테이블 입력 */
  .ch-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .ch-card { background: #fafaf8; border: 0.5px solid #e0e0da; border-radius: 10px; padding: 12px 14px; position: relative; }
  .ch-num { font-size: 12px; font-weight: 500; color: #4a90d9; margin-bottom: 8px; }

  .input-row { display: grid; grid-template-columns: 90px 1fr 1fr 80px 1fr; gap: 8px; align-items: end; }
  .output-row { display: grid; grid-template-columns: 90px 1fr 1fr 1fr; gap: 8px; align-items: end; }

  .del-ch { position: absolute; top: 10px; right: 12px; font-size: 12px; padding: 3px 10px; border-radius: 6px; cursor: pointer; border: 0.5px solid #f5c6c2; background: transparent; color: #c0392b; font-family: inherit; }
  .del-ch:hover { background: #fff5f5; }
  .add-ch-btn { width: 100%; padding: 10px; border-radius: 8px; border: 0.5px dashed #bbb; background: transparent; color: #666; font-size: 14px; cursor: pointer; font-family: inherit; }
  .add-ch-btn:hover { background: #f5f5f3; border-color: #4a90d9; color: #4a90d9; }

  .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
  button.primary { padding: 9px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; background: #1a1a18; color: #fff; font-family: inherit; }
  button.primary:hover { background: #333; }
  button.secondary { padding: 9px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 0.5px solid #ccc; background: transparent; color: #1a1a18; font-family: inherit; }
  button.secondary:hover { background: #f0f0ee; }
  button.export { padding: 9px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 0.5px solid #ccc; background: transparent; color: #1a1a18; font-family: inherit; margin-left: auto; }
  button.export:hover { background: #f0f0ee; }

  /* 저장된 기록 */
  .records { margin-top: 2rem; }
  .records-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 10px; }
  .record { background: #fff; border: 0.5px solid #e0e0da; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
  .record-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .record-artist { font-size: 15px; font-weight: 500; }
  .record-del { font-size: 12px; padding: 3px 10px; border-radius: 6px; cursor: pointer; border: 0.5px solid #f5c6c2; background: transparent; color: #c0392b; font-family: inherit; }
  .record-del:hover { background: #fff5f5; }
  .record-sub { font-size: 12px; color: #aaa; margin-top: 2px; }

  .sheet-label { font-size: 12px; font-weight: 500; color: #666; margin: 10px 0 6px; }
  .ch-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-bottom: 8px; }
  .ch-table th { text-align: left; padding: 6px 8px; color: #aaa; font-weight: 400; border-bottom: 0.5px solid #eee; font-size: 11px; background: #fafaf8; }
  .ch-table td { padding: 7px 8px; border-bottom: 0.5px solid #f5f5f3; }
  .ch-table tr:last-child td { border-bottom: none; }
  .ch-table tr:hover td { background: #fafaf8; }
  .memo-row { font-size: 12px; color: #666; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid #eee; }

  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-left: 6px; }
  .badge-in { background: #eef4ff; color: #3a6fc4; }
  .badge-out { background: #f0faf5; color: #1a6640; }
  .empty { text-align: center; padding: 3rem; color: #bbb; font-size: 14px; }
</style>
</head>
<body>
<div class="container">
  <h1>🎚️ 채널 시트</h1>
  <p class="sub">공연별 채널 세팅값 저장</p>
  <p class="credit">MADE BY : SOUND ENGINEER · HGP</p>

  <div class="card">
    <div class="sec-title">📋 공연 정보</div>
    <div class="row">
      <div>
        <label>공연명 / 아티스트 *</label>
        <input type="text" id="artist" placeholder="예: 홍길동 밴드 정기공연">
      </div>
      <div>
        <label>날짜 *</label>
        <input type="date" id="date">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="sec-title">🎛️ 채널 정보</div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('input')">📥 인풋 채널</button>
      <button class="tab" onclick="switchTab('output')">📤 아웃풋 채널</button>
    </div>

    <div id="inputSection">
      <div style="font-size:11px;color:#aaa;margin-bottom:10px;">채널번호 · 악기/소스 · 마이크 종류 · 팬텀 · 비고</div>
      <div class="ch-list" id="inputList"></div>
      <button class="add-ch-btn" onclick="addChannel('input')">+ 인풋 채널 추가</button>
    </div>

    <div id="outputSection" style="display:none;">
      <div style="font-size:11px;color:#aaa;margin-bottom:10px;">채널번호 · 용도 · 장비 · 비고</div>
      <div class="ch-list" id="outputList"></div>
      <button class="add-ch-btn" onclick="addChannel('output')">+ 아웃풋 채널 추가</button>
    </div>
  </div>

  <div class="card">
    <div class="sec-title">📝 메모</div>
    <textarea id="memo" placeholder="공연 전체 특이사항, 참고사항..."></textarea>
  </div>

  <div class="btn-row">
    <button class="primary" onclick="saveRecord()">💾 저장</button>
    <button class="secondary" onclick="clearForm()">초기화</button>
    <button class="export" onclick="exportCSV()">📥 엑셀로 내보내기</button>
  </div>

  <div class="records" id="recordsArea"></div>
</div>

<script>
  let records = JSON.parse(localStorage.getItem('channel_sheet_v1') || '[]');
  let currentTab = 'input';

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }
  document.getElementById('date').value = todayStr();

  function switchTab(tab) {
    currentTab = tab;
    document.getElementById('inputSection').style.display = tab === 'input' ? 'block' : 'none';
    document.getElementById('outputSection').style.display = tab === 'output' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'input') || (i === 1 && tab === 'output'));
    });
  }

  function updateNums(type) {
    const cards = document.querySelectorAll('#' + type + 'List .ch-card');
    cards.forEach((card, i) => {
      card.querySelector('.ch-num').textContent = (type === 'input' ? 'IN ' : 'OUT ') + (i + 1);
    });
  }

  function addChannel(type) {
    const id = type + '_' + Date.now();
    const div = document.createElement('div');
    div.className = 'ch-card';
    div.id = id;

    if (type === 'input') {
      div.innerHTML = `
        <div class="ch-num"></div>
        <button class="del-ch" onclick="removeChannel('${id}','input')">삭제</button>
        <div class="input-row">
          <div><label>채널 번호</label><input type="text" class="f-ch" placeholder="CH 1"></div>
          <div><label>악기 / 소스</label><input type="text" class="f-source" placeholder="예: 보컬, 킥, 스네어"></div>
          <div><label>마이크 종류</label><input type="text" class="f-mic" placeholder="예: SM58, Beta91"></div>
          <div><label>팬텀 (48V)</label><select class="f-phantom"><option value="">-</option><option>ON</option><option>OFF</option></select></div>
          <div><label>비고</label><input type="text" class="f-note" placeholder="특이사항"></div>
        </div>
      `;
    } else {
      div.innerHTML = `
        <div class="ch-num"></div>
        <button class="del-ch" onclick="removeChannel('${id}','output')">삭제</button>
        <div class="output-row">
          <div><label>채널 번호</label><input type="text" class="f-ch" placeholder="OUT 1"></div>
          <div><label>용도</label><input type="text" class="f-usage" placeholder="예: 메인L, 모니터1, SUB"></div>
          <div><label>장비</label><input type="text" class="f-gear" placeholder="예: d&amp;b J8, Crown XTi"></div>
          <div><label>비고</label><input type="text" class="f-note" placeholder="특이사항"></div>
        </div>
      `;
    }

    document.getElementById(type + 'List').appendChild(div);
    updateNums(type);
  }

  function removeChannel(id, type) {
    document.getElementById(id).remove();
    updateNums(type);
  }

  function saveRecord() {
    const artist = document.getElementById('artist').value.trim();
    if (!artist) { alert('공연명을 입력해주세요!'); return; }

    const inputCards = document.querySelectorAll('#inputList .ch-card');
    const outputCards = document.querySelectorAll('#outputList .ch-card');
    if (inputCards.length === 0 && outputCards.length === 0) {
      alert('채널을 최소 1개 추가해주세요!'); return;
    }

    const inputs = [];
    inputCards.forEach(card => {
      inputs.push({
        ch: card.querySelector('.f-ch').value.trim(),
        source: card.querySelector('.f-source').value.trim(),
        mic: card.querySelector('.f-mic').value.trim(),
        phantom: card.querySelector('.f-phantom').value,
        note: card.querySelector('.f-note').value.trim(),
      });
    });

    const outputs = [];
    outputCards.forEach(card => {
      outputs.push({
        ch: card.querySelector('.f-ch').value.trim(),
        usage: card.querySelector('.f-usage').value.trim(),
        gear: card.querySelector('.f-gear').value.trim(),
        note: card.querySelector('.f-note').value.trim(),
      });
    });

    const rec = {
      id: Date.now(),
      artist,
      date: document.getElementById('date').value,
      memo: document.getElementById('memo').value.trim(),
      inputs,
      outputs,
    };

    records.unshift(rec);
    localStorage.setItem('channel_sheet_v1', JSON.stringify(records));
    renderRecords();
    clearForm();
  }

  function clearForm() {
    document.getElementById('artist').value = '';
    document.getElementById('date').value = todayStr();
    document.getElementById('memo').value = '';
    document.getElementById('inputList').innerHTML = '';
    document.getElementById('outputList').innerHTML = '';
  }

  function deleteRecord(id) {
    if (!confirm('이 공연 기록을 삭제할까요?')) return;
    records = records.filter(r => r.id !== id);
    localStorage.setItem('channel_sheet_v1', JSON.stringify(records));
    renderRecords();
  }

  function exportCSV() {
    if (records.length === 0) { alert('저장된 기록이 없어요!'); return; }
    let rows = ['"날짜","공연명","구분","채널","악기/소스/용도","마이크/장비","팬텀","비고","메모"'];
    records.forEach(r => {
      r.inputs.forEach(c => {
        rows.push([r.date, r.artist, 'INPUT', c.ch, c.source, c.mic, c.phantom, c.note, r.memo]
          .map(v => '"' + (v||'').replace(/"/g,'""') + '"').join(','));
      });
      r.outputs.forEach(c => {
        rows.push([r.date, r.artist, 'OUTPUT', c.ch, c.usage, c.gear, '', c.note, r.memo]
          .map(v => '"' + (v||'').replace(/"/g,'""') + '"').join(','));
      });
    });
    const csv = '\uFEFF' + rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '채널시트_' + todayStr() + '.csv';
    a.click();
  }

  function renderRecords() {
    const area = document.getElementById('recordsArea');
    if (records.length === 0) {
      area.innerHTML = '<div class="empty">아직 저장된 기록이 없어요.<br>첫 번째 채널 시트를 작성해보세요!</div>';
      return;
    }
    let html = '<div class="records-title">저장된 기록 ' + records.length + '건</div>';
    records.forEach(r => {
      html += `
      <div class="record">
        <div class="record-top">
          <div>
            <span class="record-artist">${r.artist}</span>
            ${r.inputs.length ? `<span class="badge badge-in">IN ${r.inputs.length}ch</span>` : ''}
            ${r.outputs.length ? `<span class="badge badge-out">OUT ${r.outputs.length}ch</span>` : ''}
            <div class="record-sub">${r.date}</div>
          </div>
          <button class="record-del" onclick="deleteRecord(${r.id})">삭제</button>
        </div>

        ${r.inputs.length ? `
          <div class="sheet-label">📥 인풋 채널</div>
          <table class="ch-table">
            <thead><tr><th>채널</th><th>악기/소스</th><th>마이크</th><th>팬텀</th><th>비고</th></tr></thead>
            <tbody>
              ${r.inputs.map(c => `
                <tr>
                  <td>${c.ch||'-'}</td>
                  <td>${c.source||'-'}</td>
                  <td>${c.mic||'-'}</td>
                  <td>${c.phantom||'-'}</td>
                  <td>${c.note||'-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        ` : ''}

        ${r.outputs.length ? `
          <div class="sheet-label">📤 아웃풋 채널</div>
          <table class="ch-table">
            <thead><tr><th>채널</th><th>용도</th><th>장비</th><th>비고</th></tr></thead>
            <tbody>
              ${r.outputs.map(c => `
                <tr>
                  <td>${c.ch||'-'}</td>
                  <td>${c.usage||'-'}</td>
                  <td>${c.gear||'-'}</td>
                  <td>${c.note||'-'}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        ` : ''}

        ${r.memo ? `<div class="memo-row">📝 ${r.memo}</div>` : ''}
      </div>`;
    });
    area.innerHTML = html;
  }

  renderRecords();
</script>
</body>
</html>
