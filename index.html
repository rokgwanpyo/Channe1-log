<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>채널 시트</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; min-height: 100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 2px; }
  .credit { font-size: 12px; color: #bbb; margin-bottom: 2rem; }
  .card { background: #fff; border: 0.5px solid #e0e0da; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .sec-title { font-size: 13px; font-weight: 500; color: #666; margin-bottom: 12px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  input, select, textarea {
    width: 100%; font-size: 14px; padding: 8px 10px;
    border: 0.5px solid #ddd; border-radius: 8px;
    background: #fafaf8; color: #1a1a18; outline: none;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus { border-color: #4a90d9; }
  textarea { resize: vertical; min-height: 56px; }

  /* 인풋/아웃풋 나란히 */
  .sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .sheet-col { display: flex; flex-direction: column; }
  .col-title { font-size: 13px; font-weight: 600; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
  .col-title.in { background: #eef4ff; color: #3a6fc4; }
  .col-title.out { background: #f0faf5; color: #1a6640; }
  .col-header { display: grid; gap: 6px; margin-bottom: 6px; padding: 0 4px; }
  .in-header { grid-template-columns: 55px 1fr 1fr 1fr 55px 70px; }
  .out-header { grid-template-columns: 60px 1fr 1fr 1fr; }
  .col-header span { font-size: 11px; color: #aaa; text-align: center; }

  .ch-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .ch-row-in { display: grid; grid-template-columns: 55px 1fr 1fr 1fr 55px 70px 32px; gap: 6px; align-items: center; }
  .ch-row-out { display: grid; grid-template-columns: 60px 1fr 1fr 1fr 32px; gap: 6px; align-items: center; }
  .ch-row-in input, .ch-row-in select,
  .ch-row-out input, .ch-row-out select {
    font-size: 13px; padding: 7px 8px;
  }
  .del-btn { width: 28px; height: 32px; border-radius: 6px; border: 0.5px solid #f5c6c2; background: transparent; color: #c0392b; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .del-btn:hover { background: #fff5f5; }
  .add-ch-btn { width: 100%; padding: 8px; border-radius: 8px; border: 0.5px dashed #bbb; background: transparent; color: #888; font-size: 13px; cursor: pointer; font-family: inherit; }
  .add-ch-btn.in:hover { border-color: #4a90d9; color: #4a90d9; background: #f5f8ff; }
  .add-ch-btn.out:hover { border-color: #27ae60; color: #27ae60; background: #f5fff8; }

  .btn-row { display: flex; gap: 8px; margin-top: 1rem; }
  button.primary { padding: 9px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: none; background: #1a1a18; color: #fff; font-family: inherit; }
  button.primary:hover { background: #333; }
  button.secondary { padding: 9px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 0.5px solid #ccc; background: transparent; color: #1a1a18; font-family: inherit; }
  button.secondary:hover { background: #f0f0ee; }
  button.export { padding: 9px 20px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 0.5px solid #ccc; background: transparent; color: #1a1a18; font-family: inherit; margin-left: auto; }
  button.export:hover { background: #f0f0ee; }

  .records { margin-top: 2rem; }
  .records-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 10px; }
  .record { background: #fff; border: 0.5px solid #e0e0da; border-radius: 10px; padding: 14px 16px; margin-bottom: 12px; }
  .record-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .record-artist { font-size: 15px; font-weight: 500; }
  .record-sub { font-size: 12px; color: #aaa; margin-top: 2px; }
  .record-del { font-size: 12px; padding: 3px 10px; border-radius: 6px; cursor: pointer; border: 0.5px solid #f5c6c2; background: transparent; color: #c0392b; font-family: inherit; }
  .record-del:hover { background: #fff5f5; }
  .record-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .sheet-label { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 6px; margin-bottom: 6px; display: inline-block; }
  .sheet-label.in { background: #eef4ff; color: #3a6fc4; }
  .sheet-label.out { background: #f0faf5; color: #1a6640; }
  .ch-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .ch-table th { text-align: left; padding: 5px 7px; color: #aaa; font-weight: 400; border-bottom: 0.5px solid #eee; font-size: 11px; background: #fafaf8; }
  .ch-table td { padding: 6px 7px; border-bottom: 0.5px solid #f5f5f3; }
  .ch-table tr:last-child td { border-bottom: none; }
  .ch-table tr:hover td { background: #fafaf8; }
  .memo-row { font-size: 12px; color: #666; margin-top: 10px; padding-top: 8px; border-top: 0.5px solid #eee; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 99px; margin-left: 6px; }
  .badge-in { background: #eef4ff; color: #3a6fc4; }
  .badge-out { background: #f0faf5; color: #1a6640; }
  .empty { text-align: center; padding: 3rem; color: #bbb; font-size: 14px; }

  @media (max-width: 700px) {
    .sheet-grid { grid-template-columns: 1fr; }
    .record-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🎚️ 채널 시트</h1>
  <p class="sub">공연별 채널 세팅값 저장</p>
  <p class="credit">MADE BY : SOUND ENGINEER · HGP</p>

  <div class="card">
    <div class="sec-title">📋 공연 정보</div>
    <div class="row">
      <div>
        <label>공연명 / 아티스트 *</label>
        <input type="text" id="artist" placeholder="예: 홍길동 밴드 정기공연">
      </div>
      <div>
        <label>날짜 *</label>
        <input type="date" id="date">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="sec-title">🎛️ 채널 정보</div>
    <div class="sheet-grid">

      <!-- 인풋 -->
      <div class="sheet-col">
        <div class="col-title in">📥 인풋 채널</div>
        <div class="col-header in-header">
          <span>채널번호</span><span>악기/소스</span><span>마이크</span><span>렉/로컬</span><span>팬텀</span><span>비고</span>
        </div>
        <div class="ch-list" id="inputList"></div>
        <button class="add-ch-btn in" onclick="addChannel('input')">+ 인풋 채널 추가</button>
      </div>

      <!-- 아웃풋 -->
      <div class="sheet-col">
        <div class="col-title out">📤 아웃풋 채널</div>
        <div class="col-header out-header">
          <span>채널번호</span><span>용도</span><span>장비</span><span>비고</span>
        </div>
        <div class="ch-list" id="outputList"></div>
        <button class="add-ch-btn out" onclick="addChannel('output')">+ 아웃풋 채널 추가</button>
      </div>

    </div>
  </div>

  <div class="card">
    <div class="sec-title">📝 메모</div>
    <textarea id="memo" placeholder="공연 전체 특이사항, 참고사항..."></textarea>
  </div>

  <div class="btn-row">
    <button class="primary" onclick="saveRecord()">💾 저장</button>
    <button class="secondary" onclick="clearForm()">초기화</button>
    <button class="export" onclick="exportCSV()">📥 엑셀로 내보내기</button>
  </div>

  <div class="records" id="recordsArea"></div>
</div>

<script>
  let records = JSON.parse(localStorage.getItem('channel_sheet_v2') || '[]');

  function todayStr() {
    return new Date().toISOString().slice(0, 10);
  }
  document.getElementById('date').value = todayStr();

  function addChannel(type) {
    const id = type + '_' + Date.now();
    const div = document.createElement('div');
    div.id = id;

    if (type === 'input') {
      div.className = 'ch-row-in';
      div.innerHTML = `
        <input type="text" class="f-ch" placeholder="CH 1">
        <input type="text" class="f-source" placeholder="보컬, 킥...">
        <input type="text" class="f-mic" placeholder="SM58...">
        <input type="text" class="f-rack" placeholder="로컬, 랙1...">
        <select class="f-phantom"><option value="">-</option><option>ON</option><option>OFF</option></select>
        <input type="text" class="f-note" placeholder="비고">
        <button class="del-btn" onclick="removeChannel('${id}')">×</button>
      `;
    } else {
      div.className = 'ch-row-out';
      div.innerHTML = `
        <input type="text" class="f-ch" placeholder="OUT 1">
        <input type="text" class="f-usage" placeholder="메인L, 모니터1...">
        <input type="text" class="f-gear" placeholder="d&b J8...">
        <input type="text" class="f-note" placeholder="비고">
        <button class="del-btn" onclick="removeChannel('${id}')">×</button>
      `;
    }

    document.getElementById(type + 'List').appendChild(div);
  }

  function removeChannel(id) {
    document.getElementById(id).remove();
  }

  function saveRecord() {
    const artist = document.getElementById('artist').value.trim();
    if (!artist) { alert('공연명을 입력해주세요!'); return; }

    const inputCards = document.querySelectorAll('#inputList .ch-row-in');
    const outputCards = document.querySelectorAll('#outputList .ch-row-out');
    if (inputCards.length === 0 && outputCards.length === 0) {
      alert('채널을 최소 1개 추가해주세요!'); return;
    }

    const inputs = [];
    inputCards.forEach(card => {
      inputs.push({
        ch: card.querySelector('.f-ch').value.trim(),
        source: card.querySelector('.f-source').value.trim(),
        mic: card.querySelector('.f-mic').value.trim(),
        rack: card.querySelector('.f-rack').value.trim(),
        phantom: card.querySelector('.f-phantom').value,
        note: card.querySelector('.f-note').value.trim(),
      });
    });

    const outputs = [];
    outputCards.forEach(card => {
      outputs.push({
        ch: card.querySelector('.f-ch').value.trim(),
        usage: card.querySelector('.f-usage').value.trim(),
        gear: card.querySelector('.f-gear').value.trim(),
        note: card.querySelector('.f-note').value.trim(),
      });
    });

    const rec = {
      id: Date.now(),
      artist,
      date: document.getElementById('date').value,
      memo: document.getElementById('memo').value.trim(),
      inputs,
      outputs,
    };

    records.unshift(rec);
    localStorage.setItem('channel_sheet_v2', JSON.stringify(records));
    renderRecords();
    clearForm();
  }

  function clearForm() {
    document.getElementById('artist').value = '';
    document.getElementById('date').value = todayStr();
    document.getElementById('memo').value = '';
    document.getElementById('inputList').innerHTML = '';
    document.getElementById('outputList').innerHTML = '';
  }

  function deleteRecord(id) {
    if (!confirm('이 공연 기록을 삭제할까요?')) return;
    records = records.filter(r => r.id !== id);
    localStorage.setItem('channel_sheet_v2', JSON.stringify(records));
    renderRecords();
  }

  function exportCSV() {
    if (records.length === 0) { alert('저장된 기록이 없어요!'); return; }
    let rows = ['"날짜","공연명","구분","채널","악기/소스/용도","마이크/장비","렉/로컬","팬텀","비고","메모"'];
    records.forEach(r => {
      r.inputs.forEach(c => {
        rows.push([r.date, r.artist, 'INPUT', c.ch, c.source, c.mic, c.rack, c.phantom, c.note, r.memo]
          .map(v => '"' + (v||'').replace(/"/g,'""') + '"').join(','));
      });
      r.outputs.forEach(c => {
        rows.push([r.date, r.artist, 'OUTPUT', c.ch, c.usage, c.gear, '', c.note, r.memo]
          .map(v => '"' + (v||'').replace(/"/g,'""') + '"').join(','));
      });
    });
    const csv = '\uFEFF' + rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '채널시트_' + todayStr() + '.csv';
    a.click();
  }

  function renderRecords() {
    const area = document.getElementById('recordsArea');
    if (records.length === 0) {
      area.innerHTML = '<div class="empty">아직 저장된 기록이 없어요.<br>첫 번째 채널 시트를 작성해보세요!</div>';
      return;
    }
    let html = '<div class="records-title">저장된 기록 ' + records.length + '건</div>';
    records.forEach(r => {
      html += `
      <div class="record">
        <div class="record-top">
          <div>
            <span class="record-artist">${r.artist}</span>
            ${r.inputs.length ? `<span class="badge badge-in">IN ${r.inputs.length}ch</span>` : ''}
            ${r.outputs.length ? `<span class="badge badge-out">OUT ${r.outputs.length}ch</span>` : ''}
            <div class="record-sub">${r.date}</div>
          </div>
          <button class="record-del" onclick="deleteRecord(${r.id})">삭제</button>
        </div>
        <div class="record-grid">
          ${r.inputs.length ? `
            <div>
              <span class="sheet-label in">📥 인풋</span>
              <table class="ch-table">
                <thead><tr><th>채널</th><th>악기/소스</th><th>마이크</th><th>렉/로컬</th><th>팬텀</th><th>비고</th></tr></thead>
                <tbody>
                  ${r.inputs.map(c => `<tr><td>${c.ch||'-'}</td><td>${c.source||'-'}</td><td>${c.mic||'-'}</td><td>${c.rack||'-'}</td><td>${c.phantom||'-'}</td><td>${c.note||'-'}</td></tr>`).join('')}
                </tbody>
              </table>
            </div>
          ` : '<div></div>'}
          ${r.outputs.length ? `
            <div>
              <span class="sheet-label out">📤 아웃풋</span>
              <table class="ch-table">
                <thead><tr><th>채널</th><th>용도</th><th>장비</th><th>비고</th></tr></thead>
                <tbody>
                  ${r.outputs.map(c => `<tr><td>${c.ch||'-'}</td><td>${c.usage||'-'}</td><td>${c.gear||'-'}</td><td>${c.note||'-'}</td></tr>`).join('')}
                </tbody>
              </table>
            </div>
          ` : '<div></div>'}
        </div>
        ${r.memo ? `<div class="memo-row">📝 ${r.memo}</div>` : ''}
      </div>`;
    });
    area.innerHTML = html;
  }

  renderRecords();
</script>
</body>
</html>
